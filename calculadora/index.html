<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Grêmio</title>
    <style>
        /* ============================================================
           Calculadora Grêmio — Story 1.1
           Stack: HTML5 + CSS3 vanilla (NFR1)
           Execução: file:// (NFR2) — zero dependências externas (NFR1, NFR8)
           ============================================================ */

        /* --- Tokens: cores oficiais Grêmio (NFR3) --- */
        :root {
            --gremio-azul:   #0099CC;
            --gremio-preto:  #000000;
            --gremio-branco: #FFFFFF;
        }

        /* --- Reset mínimo --- */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html, body {
            height: 100%;
        }

        /* --- Body com listras tradicionais verticais azul/preto/azul (NFR3.1).
               Fundo dominante do clube — proibido fundo neutro (NFR3.4). --- */
        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                         system-ui, Arial, sans-serif;
            color: var(--gremio-branco);

            background: linear-gradient(
                90deg,
                var(--gremio-azul)   0%,    var(--gremio-azul)   33.33%,
                var(--gremio-preto)  33.33%, var(--gremio-preto)  66.66%,
                var(--gremio-azul)   66.66%, var(--gremio-azul)   100%
            );
            background-attachment: fixed;

            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
        }

        /* --- Header com logo Grêmio (FR7) --- */
        header {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem 0 1.5rem;
        }

        .logo {
            height: 70px;          /* mobile default — alvo 60–80px */
            width: auto;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
        }

        /* --- Container central da calculadora --- */
        .calculator {
            width: 100%;
            max-width: 360px;
            background: var(--gremio-preto);
            border: 4px solid var(--gremio-azul);
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 12px 32px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        /* --- Display numérico --- */
        .display {
            background: var(--gremio-branco);
            color: var(--gremio-preto);
            font-size: 2rem;
            font-weight: 700;
            text-align: right;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 2px solid var(--gremio-azul);
            min-height: 3.5rem;
            line-height: 2rem;
            overflow: hidden;
            text-overflow: ellipsis;
            user-select: none;
        }

        /* --- Grid de botões 4×5 --- */
        .keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }

        .btn {
            font-family: inherit;
            font-size: 1.25rem;
            font-weight: 600;
            min-height: 56px;       /* touch-target generoso */
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
            transition: filter 0.15s ease, transform 0.08s ease, box-shadow 0.08s ease;
            user-select: none;
        }

        .btn:hover  { filter: brightness(1.15); }
        .btn:active { transform: translateY(4px); box-shadow: 0 0px 0 rgba(0,0,0,0.3); filter: brightness(0.9); }
        .btn:focus-visible {
            outline: 3px solid var(--gremio-branco);
            outline-offset: 2px;
        }

        /* Botões numéricos (0–9 + vírgula): preto + branco (NFR3.2) */
        .btn-num {
            background: var(--gremio-preto);
            color: var(--gremio-branco);
            border-color: var(--gremio-azul);
        }

        /* Botões de operadores (+ − × ÷): azul + branco (NFR3.2) */
        .btn-op {
            background: var(--gremio-azul);
            color: var(--gremio-branco);
            border-color: var(--gremio-branco);
        }

        /* Botão Igual: branco + azul (contraste destaque) */
        .btn-eq {
            background: var(--gremio-branco);
            color: var(--gremio-azul);
            border-color: var(--gremio-azul);
        }

        /* Botão Clear: branco + azul (contraste de reset) */
        .btn-clear {
            background: var(--gremio-branco);
            color: var(--gremio-azul);
            border-color: var(--gremio-preto);
        }

        /* Botão 0 ocupa 4 colunas na última linha */
        .btn-zero {
            grid-column: span 4;
        }

        /* --- Footer discreto opcional (identidade do clube) --- */
        .footer-tag {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: var(--gremio-branco);
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
            letter-spacing: 0.05em;
            text-align: center;
        }

        /* ============================================================
           Responsivo (NFR4): >=320px (mobile) e >=1024px (desktop)
           ============================================================ */

        /* Tablet+ */
        @media (min-width: 600px) {
            .logo { height: 90px; }
            .display { font-size: 2.25rem; min-height: 4rem; }
            .btn { font-size: 1.4rem; min-height: 64px; }
        }

        /* Desktop — logo 80–120px (FR7) */
        @media (min-width: 1024px) {
            body { padding: 2rem; }
            .logo { height: 110px; }
            .calculator { max-width: 420px; padding: 1.25rem; }
            .display { font-size: 2.5rem; }
            .btn { font-size: 1.5rem; min-height: 68px; }
        }
    </style>
</head>
<body>
    <header>
        <img class="logo" src="gremio-logo.png"
             alt="Grêmio Foot-Ball Porto Alegrense">
    </header>

    <main class="calculator" role="application" aria-label="Calculadora Grêmio">
        <div id="display" class="display" role="status" aria-live="polite">0</div>

        <div class="keys" role="group" aria-label="Teclado da calculadora">
            <!-- Linha 1 -->
            <button type="button" class="btn btn-clear" data-action="clear" aria-label="Limpar">C</button>
            <button type="button" class="btn btn-num"   data-key="."        aria-label="Vírgula">,</button>
            <button type="button" class="btn btn-op"    data-op="divide"    aria-label="Dividir">÷</button>
            <button type="button" class="btn btn-op"    data-op="multiply"  aria-label="Multiplicar">×</button>

            <!-- Linha 2 -->
            <button type="button" class="btn btn-num" data-key="7">7</button>
            <button type="button" class="btn btn-num" data-key="8">8</button>
            <button type="button" class="btn btn-num" data-key="9">9</button>
            <button type="button" class="btn btn-op"  data-op="subtract" aria-label="Subtrair">−</button>

            <!-- Linha 3 -->
            <button type="button" class="btn btn-num" data-key="4">4</button>
            <button type="button" class="btn btn-num" data-key="5">5</button>
            <button type="button" class="btn btn-num" data-key="6">6</button>
            <button type="button" class="btn btn-op"  data-op="add" aria-label="Somar">+</button>

            <!-- Linha 4 -->
            <button type="button" class="btn btn-num" data-key="1">1</button>
            <button type="button" class="btn btn-num" data-key="2">2</button>
            <button type="button" class="btn btn-num" data-key="3">3</button>
            <button type="button" class="btn btn-eq"  data-action="equals" aria-label="Igual">=</button>

            <!-- Linha 5 -->
            <button type="button" class="btn btn-num btn-zero" data-key="0">0</button>
        </div>
    </main>

    <p class="footer-tag">Imortal Tricolor</p>

    <!-- Lógica de cálculo (encadeamento, divisão por zero) implementada para Story 1.2 -->
    <script>
        // NFR7: suporte a teclado físico está fora do escopo do MVP — apenas clique/touch.
        const state = {
            currentInput: "0",
            previousValue: null,
            pendingOperator: null,
            waitingForSecondOperand: false,
            isErrored: false
        };

        function renderDisplay() {
            const display = document.getElementById('display');
            if (state.isErrored) {
                display.textContent = "Erro";
            } else {
                display.textContent = state.currentInput.replace('.', ',');
            }
        }

        function formatNumber(n) {
            return parseFloat(n.toFixed(10)).toString();
        }

        function compute(a, b, op) {
            switch(op) {
                case 'add': return a + b;
                case 'subtract': return a - b;
                case 'multiply': return a * b;
                case 'divide': return b === 0 ? null : a / b;
            }
            return b;
        }

        function resetState() {
            state.currentInput = "0";
            state.previousValue = null;
            state.pendingOperator = null;
            state.waitingForSecondOperand = false;
            state.isErrored = false;
            renderDisplay();
        }

        // Digits
        document.querySelectorAll('.btn-num[data-key]').forEach(btn => {
            const key = btn.getAttribute('data-key');
            if (key === '.') return; // Handled separately
            
            btn.addEventListener('click', () => {
                if (state.isErrored) return;
                
                if (state.waitingForSecondOperand) {
                    state.currentInput = key;
                    state.waitingForSecondOperand = false;
                } else if (state.currentInput === "0") {
                    state.currentInput = key;
                } else {
                    state.currentInput += key;
                }
                renderDisplay();
            });
        });

        // Comma
        document.querySelector('.btn-num[data-key="."]').addEventListener('click', () => {
            if (state.isErrored) return;
            
            if (state.waitingForSecondOperand) {
                state.currentInput = "0.";
                state.waitingForSecondOperand = false;
            } else if (!state.currentInput.includes('.')) {
                if (state.currentInput === "") {
                    state.currentInput = "0.";
                } else {
                    state.currentInput += ".";
                }
            }
            renderDisplay();
        });

        // Operators
        document.querySelectorAll('.btn-op[data-op]').forEach(btn => {
            btn.addEventListener('click', () => {
                if (state.isErrored) return;
                
                const op = btn.getAttribute('data-op');
                
                if (state.waitingForSecondOperand) {
                    state.pendingOperator = op;
                    return;
                }
                
                if (state.pendingOperator !== null) {
                    const result = compute(state.previousValue, parseFloat(state.currentInput), state.pendingOperator);
                    if (result === null) {
                        state.isErrored = true;
                        renderDisplay();
                        return;
                    } else {
                        state.previousValue = result;
                        state.currentInput = formatNumber(result);
                        renderDisplay();
                    }
                } else {
                    state.previousValue = parseFloat(state.currentInput);
                }
                
                state.pendingOperator = op;
                state.waitingForSecondOperand = true;
            });
        });

        // Equals
        document.querySelector('.btn-eq[data-action="equals"]').addEventListener('click', () => {
            if (state.isErrored) return;
            if (state.pendingOperator === null) return;
            
            const result = compute(state.previousValue, parseFloat(state.currentInput), state.pendingOperator);
            if (result === null) {
                state.isErrored = true;
            } else {
                state.currentInput = formatNumber(result);
                state.previousValue = null;
                state.pendingOperator = null;
                state.waitingForSecondOperand = false;
            }
            renderDisplay();
        });

        // Clear
        document.querySelector('.btn-clear[data-action="clear"]').addEventListener('click', () => {
            resetState();
        });
    </script>
</body>
</html>
